services:
  backend:
    image: ghcr.io/${IMAGE_NAMESPACE}/shop-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    pull_policy: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:/usr/src/app/data/prod.db}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - backend_data:/usr/src/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/${IMAGE_NAMESPACE}/shop-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    pull_policy: always
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend_data:
